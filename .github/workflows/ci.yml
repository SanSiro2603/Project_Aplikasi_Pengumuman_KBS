name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze | tee analyze_output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: analyze-output
          path: analyze_output.txt

  unit_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: |
          mkdir -p reports
          flutter test --machine > reports/flutter_test_machine.json
      - uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/flutter_test_machine.json

  build_android_debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --debug --dart-define=SUPABASE_URL=dummy --dart-define=SUPABASE_ANON_KEY=dummy
      - uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  supabase_function_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/notify_warga/index.ts

